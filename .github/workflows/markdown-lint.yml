name: Markdown Lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-lint.yml"
  workflow_dispatch:

jobs:
  lint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "!node_modules"
