name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  release-notes:
    name: Release notes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Summarize release
        run: |
          echo "AiFinPay Paywall release"
          echo "Tag: ${GITHUB_REF_NAME}"
          test -f CHANGELOG.md
