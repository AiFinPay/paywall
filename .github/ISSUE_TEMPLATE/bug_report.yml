name: Bug Report
description: Report a reproducible bug in docs, examples, schemas, SDKs, or protocol tooling.
title: "bug: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For vulnerabilities, do not use this form; email security@aifinpay.io.
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: docs, openapi, schemas, sdk, examples, sandbox
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: input
    id: protocol-version
    attributes:
      label: Protocol version
      placeholder: AIFP-1 / 1.0.0
